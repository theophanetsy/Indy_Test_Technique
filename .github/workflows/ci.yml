name: CI – Tests unitaires

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run tests
        shell: bash
        run: |
          shopt -s globstar
          npm run build:ts && tsc -p test/tsconfig.json && npx c8 node --test -r ts-node/register test/**/*.ts
        env:
          NODE_ENV: test
